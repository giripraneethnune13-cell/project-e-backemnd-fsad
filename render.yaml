services:
  # ─── Spring Boot Backend ───────────────────────────────────────────
  - type: web
    name: fsad-backend
    runtime: java
    rootDir: backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -Xmx300m -Dspring.profiles.active=prod -jar target/student-portfolio-0.0.1-SNAPSHOT.jar
    plan: free
    envVars:
      - key: DB_URL
        sync: false          # set manually in Render dashboard
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true  # auto-generated random secret
      - key: SPRING_PROFILES_ACTIVE
        value: prod
