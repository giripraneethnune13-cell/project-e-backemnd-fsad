services:
  # ─── Spring Boot Backend ───────────────────────────────────────────
  - type: web
    name: fsad-backend
    runtime: java
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dspring.profiles.active=prod -jar target/student-portfolio-0.0.1-SNAPSHOT.jar
    plan: free
    envVars:
      - key: DB_URL
        sync: false          # set manually in Render dashboard
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true  # auto-generated random secret
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # ─── React Frontend ────────────────────────────────────────────────
  - type: web
    name: fsad-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: https://fsad-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
