spring.application.name=student-portfolio

# Railway MySQL Native Environment Variables
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:${MYSQLHOST:mysql.railway.internal}}:${MYSQL_PORT:${MYSQLPORT:3306}}/${MYSQL_DATABASE:${MYSQLDATABASE:railway}}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:${MYSQLUSER:root}}
spring.datasource.password=${MYSQL_PASSWORD:${MYSQLPASSWORD:gWptrbHVhHCOyEQZmSqUrMYontnVulRm}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
app.jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm1234567890}
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=/tmp/uploads

# Server
server.port=${PORT:8080}
